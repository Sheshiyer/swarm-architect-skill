      - projectBrief
      - contractsPath
      - ownershipModel
      - validationGatePath
  workerPacket:
    required:
      - runtime
      - role
      - taskId
      - objective
      - readFirst
      - ownedSurfaces
      - forbiddenZones
      - deliverables
      - handbackFormat
